name: 构建 Tinyproxy

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本标签'
        required: false
        default: '1.11.0'
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: 构建 (${{ matrix.platform }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x86_64
          - os: ubuntu-24.04
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: linux
            arch: armv7l
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: macos-14
            platform: macos
            arch: arm64
          - os: macos-12
            platform: macos
            arch: x86_64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          repository: tinyproxy/tinyproxy
          ref: master
          fetch-depth: 1

      - name: 安装依赖 (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            glib2.0-dev \
            libev-dev \
            autoconf-archive \
            help2man

      - name: 安装依赖 (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install autoconf automake libtool pkg-config glib autoconf-archive help2man

      - name: 安装依赖 (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          choco install -y make mingw msys2 coreutils unzip

      - name: 生成构建脚本
        run: |
          chmod +x autogen.sh
          ./autogen.sh
        shell: bash
        if: matrix.platform != 'windows'

      - name: 生成构建脚本 (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export PATH="/c/msys64/usr/bin:/c/mingw64/bin:$PATH"
          chmod +x autogen.sh
          bash autogen.sh

      - name: 配置
        run: |
          ./configure --prefix=/usr/local
        shell: bash
        if: matrix.platform != 'windows'

      - name: 配置 (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export PATH="/c/msys64/usr/bin:/c/mingw64/bin:$PATH"
          export PKG_CONFIG_PATH="/c/msys64/usr/lib/pkgconfig:/c/mingw64/lib/pkgconfig"
          ./configure --prefix=/c/tinyproxy

      - name: 编译并打包 (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4) install DESTDIR=$(pwd)/tinyproxy-install
          tar -czf tinyproxy-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C tinyproxy-install .
          ls -la tinyproxy-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz

      - name: 编译并打包 (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export PATH="/c/msys64/usr/bin:/c/mingw64/bin:$PATH"
          make install DESTDIR="C:/tinyproxy-install"
          if [ -d /c/tinyproxy ]; then
            cd /c/tinyproxy && zip -r /c/tinyproxy-install/tinyproxy-windows-${{ matrix.arch }}.zip . && cd /
          fi
          cd tinyproxy-install 2>/dev/null && zip -r ../tinyproxy-windows-${{ matrix.arch }}.zip . 2>/dev/null || ls -la

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: tinyproxy-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            tinyproxy-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            tinyproxy-${{ matrix.platform }}-${{ matrix.arch }}.zip
          retention-days: 7